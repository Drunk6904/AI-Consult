# =============================================================================
# AI智能客服系统 - 应用配置文件
# =============================================================================
# 说明：
# 1. 敏感配置（API Keys、密码等）请通过环境变量或 .env 文件设置
# 2. 本文件使用 ${ENV_VAR:default} 格式支持环境变量覆盖
# 3. 优先级：环境变量 > .env 文件 > 本文件默认值
# =============================================================================

# 应用名称
spring.application.name=ai_consult_backend

# =============================================================================
# 文件上传配置
# =============================================================================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}

# =============================================================================
# Dify API 配置
# 说明：以下配置优先从环境变量读取，如未设置则使用默认值（空值）
# 生产环境请确保通过 .env 文件或环境变量设置真实值
# =============================================================================

# Dify API 基础 URL
dify.api.url=${DIFY_API_URL:http://localhost/v1}

# Workflow API Key（用于工作流执行）
dify.workflow.api.key=${DIFY_WORKFLOW_API_KEY:}

# Chatflow API Key（用于对话流聊天）
dify.chatflow.api.key=${DIFY_CHATFLOW_API_KEY:}

# Dataset API Key（用于知识库文档管理）
dify.dataset.api.key=${DIFY_DATASET_API_KEY:}

# 公开知识库 ID（30% 公开知识）
dify.knowledge.base.id=${DIFY_KNOWLEDGE_BASE_ID:}

# 私有知识库 ID（70% 非公开知识）
dify.knowledge.private.base.id=${DIFY_KNOWLEDGE_PRIVATE_BASE_ID:}

# 工作流 ID
dify.workflow.id=${DIFY_WORKFLOW_ID:}

# Webhook 配置
dify.webhook.url=${DIFY_WEBHOOK_URL:}
dify.webhook.debug.url=${DIFY_WEBHOOK_DEBUG_URL:}

# 功能切换标志：workflow | chatflow
dify.feature.workflow.type=${FEATURE_FLAG_WORKFLOW_TYPE:workflow}

# =============================================================================
# JWT 认证配置
# =============================================================================

# JWT 签名密钥（必填，至少32个字符）
jwt.secret.key=${JWT_SECRET_KEY:}

# JWT Token 过期时间（毫秒，默认2小时）
jwt.expiration.time=${JWT_EXPIRATION_TIME:7200000}

# =============================================================================
# 数据库配置（已迁移至 MySQL）
# =============================================================================

# 数据库连接 URL
# MySQL 格式：jdbc:mysql://<host>:<port>/<database>?<参数>
# 参数说明：
#   - useSSL=false: 禁用 SSL（开发环境）
#   - serverTimezone=Asia/Shanghai: 设置时区
#   - allowPublicKeyRetrieval=true: 允许公钥检索（解决 caching_sha2_password 问题）
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ai_consult?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}

# 数据库驱动
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# 数据库用户名
spring.datasource.username=${DB_USERNAME:root}

# 数据库密码
spring.datasource.password=${DB_PASSWORD:123456}

# JPA/Hibernate 配置
# MySQL 方言
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# DDL 策略：update - 自动更新表结构（开发环境）
# 生产环境建议用 validate 或 none
spring.jpa.hibernate.ddl-auto=update
# 显示 SQL（开发调试用）
spring.jpa.show-sql=false
# 格式化 SQL
spring.jpa.properties.hibernate.format_sql=true

# 连接池配置（HikariCP）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# H2 控制台（可选，如需同时使用 H2 可启用）
# spring.h2.console.enabled=true

# =============================================================================
# 日志配置
# =============================================================================
logging.level.com.zhuofeng.ai_consult_backend=INFO
logging.level.org.springframework.security=DEBUG
